<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#0c0a09"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Amber accent bar top -->
  <rect x="0" y="0" width="1200" height="4" fill="#f59e0b"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#292524" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#292524" stroke-width="1"/>

  <!-- Logo mark — lens shape -->
  <ellipse cx="600" cy="180" rx="48" ry="48" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <ellipse cx="600" cy="180" rx="20" ry="20" fill="#f59e0b" opacity="0.9"/>

  <!-- Brand name -->
  <text x="600" y="278" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#fafaf9" text-anchor="middle">ExtraLenses</text>

  <!-- Tagline -->
  <text x="600" y="338" font-family="Georgia, serif" font-size="28" fill="#a8a29e" text-anchor="middle">Self-hosted Perspective API replacement</text>

  <!-- Divider -->
  <rect x="480" y="368" width="240" height="2" fill="#f59e0b" opacity="0.4"/>

  <!-- Three pillars -->
  <text x="240" y="430" font-family="-apple-system, sans-serif" font-size="20" fill="#f59e0b" text-anchor="middle">Sentence-level precision</text>
  <text x="600" y="430" font-family="-apple-system, sans-serif" font-size="20" fill="#f59e0b" text-anchor="middle">Docker Compose</text>
  <text x="960" y="430" font-family="-apple-system, sans-serif" font-size="20" fill="#f59e0b" text-anchor="middle">Artalk · Remark42 · REST</text>

  <text x="240" y="460" font-family="-apple-system, sans-serif" font-size="16" fill="#78716c" text-anchor="middle">Tags individual sentences</text>
  <text x="600" y="460" font-family="-apple-system, sans-serif" font-size="16" fill="#78716c" text-anchor="middle">Your data, your infra</text>
  <text x="960" y="460" font-family="-apple-system, sans-serif" font-size="16" fill="#78716c" text-anchor="middle">Drop-in integrations</text>

  <!-- Urgency line -->
  <text x="600" y="556" font-family="-apple-system, sans-serif" font-size="18" fill="#57534e" text-anchor="middle">Perspective API shuts down December 31, 2026</text>

  <!-- URL -->
  <text x="600" y="596" font-family="-apple-system, sans-serif" font-size="16" fill="#44403c" text-anchor="middle">extralenses.com</text>
</svg>
